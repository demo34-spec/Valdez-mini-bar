<!DOCTYPE html>
<html lang="en">
    <head>
        <title>PayPal Payment - Valdez Mini Bar</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="PayPal checkout page for Valdez Mini Bar">
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="page-shell">
            <div class="page-head">
                <h1>💳 PayPal Checkout</h1>
                <p>Use the same Valdez Mini Bar payment style for PayPal.</p>
            </div>

            <div class="payment-container">
                <h2 class="section-title">Choose your payment method</h2>
                <div class="payment-methods">
                    <button type="button">Mastercard</button>
                    <button type="button">Visa</button>
                    <button type="button">PayPal</button>
                </div>

                <h2 class="section-title">Billing information</h2>
                <form>
                    <input class="input-field" type="text" placeholder="Full name" required>
                    <input class="input-field" type="email" placeholder="Email address" required>
                    <input class="input-field" type="text" placeholder="Address" required>

                    <h2 class="section-title">PayPal details</h2>
                    <input class="input-field" type="text" placeholder="PayPal email" required>
                    <input class="input-field" type="text" placeholder="Full name" required>

                    <div class="card-row">
                        <input class="input-field" type="text" placeholder="MM/YY" required>
                        <input class="input-field" type="text" placeholder="CVV" required>
                    </div>

                    <button class="pay-btn" type="submit">Pay with PayPal</button>
                </form>
            </div>

            <a href="index.html" class="back-btn">Back to menu</a>
        </div>
    </body>
</html>
