<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALDEZ MINI BAR</title>
    <meta name="description" content="Come and enjoy with us">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <h1>Valdez Mini Bar Menu</h1>

        <h2>COCKTAILS</h2>
        <div class="menu">
            <a href="Valdez-payment.html">
                <div class="item">
                    <img src="img/Mojito.img.jpg" alt="Mojito">
                    <p>Mojito</p>
                    <p class="price">$6</p>
                </div>
            </a>

            <a href="Valdez-payment.html">
                <div class="item">
                    <img src="img/margarita.img.jpeg" alt="Margarita">
                    <p>Margarita</p>
                    <p class="price">$7</p>
                </div>
            </a>

            <a href="Valdez-payment.html">
                <div class="item">
                    <img src="img/pina colada.img.jpeg" alt="Pina Colada">
                    <p>Pina Colada</p>
                    <p class="price">$6</p>
                </div>
            </a>
        </div>

        <h2>Beers</h2>
        <div class="menu">
            <a href="Valdez-payment.html">
                <div class="item">
                    <img src="img/Heineken.img.jpg" alt="Heineken">
                    <p>Heineken</p>
                    <p class="price">$4</p>
                </div>
            </a>

            <a href="Valdez-payment.html">
                <div class="item">
                    <img src="img/corona.img.jpg" alt="Corona">
                    <p>Corona</p>
                    <p class="price">$4</p>
                </div>
            </a>

            <a href="Valdez-payment.html">
                <div class="item">
                    <img src="img/budweiser.img.jpg" alt="Budweiser">
                    <p>Budweiser</p>
                    <p class="price">$3</p>
                </div>
            </a>
        </div>

        <h2>Soft drinks</h2>
        <div class="menu">
            <a href="Valdez-payment.html">
                <div class="item">
                    <img src="img/coca.img.jpg" alt="Coca-Cola">
                    <p>Coca-Cola</p>
                    <p class="price">$2</p>
                </div>
            </a>

            <a href="Valdez-payment.html">
                <div class="item">
                    <img src="img/orange.img.jpg" alt="Orange Juice">
                    <p>Orange juice</p>
                    <p class="price">$3</p>
                </div>
            </a>

            <a href="Valdez-payment.html">
                <div class="item">
                    <img src="img/lemon.img.jpg" alt="Lemonade">
                    <p>Lemonade</p>
                    <p class="price">$2</p>
                </div>
            </a>
        </div>

        <h2>Opening hours</h2>
        <div class="hours">
            <p><span>Monday-Friday</span><b>6PM-2AM</b></p>
            <p><span>Saturday</span><b>5PM-3AM</b></p>
            <p><span>Sunday</span><b>Closed</b></p>
        </div>
    </div>
</body>
</html>
